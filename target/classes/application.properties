# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL DataSource ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/studentconnect
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT Configuration ────────────────────────────────────────────────────────
# Generate a strong secret: openssl rand -hex 64
jwt.secret=your-super-secret-jwt-key-minimum-256-bits-long-replace-this-in-production
jwt.expiration=86400000

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.studentconnect=DEBUG
logging.level.org.springframework.security=WARN

# ─── CORS ─────────────────────────────────────────────────────────────────────
spring.mvc.cors.allowed-origins=http://localhost:3000,http://10.0.2.2:8080
